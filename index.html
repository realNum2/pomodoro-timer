<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focusly - Pomodoro timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <script defer src="tasks.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">Focusly</h1>

        <hr>
        <p class="timer" id="timer">25:00</p>

        <div class="button-wrapper">
            <button id="settings"><i class="ri-settings-5-line"></i></button>
            <button id="start"><i class="ri-play-fill"></i>Start</button>
            <button id="stop"><i class="ri-stop-fill"></i>Stop</button>
            <button id="reset"><i class="ri-reset-left-line"></i></button>
        </div>
    </div>

    <form onsubmit="event.preventDefault(); addNewTask();">
        <h1>Tasks</h1>
        <input type="text" id="newTaskInput" placeholder="New Task..."/>
        <button class="submitButton" type="submit"><i class="ri-add-large-line"></i>Add</button>
        <ul id="taskList"></ul>
    </form>
    

    <script src="app.js"></script>
</body>
</html>
